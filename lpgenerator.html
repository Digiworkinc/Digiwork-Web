<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Landing Page AI - Standalone</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Single File App -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        body { background-color: #f8fafc; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        // Komponen Ikon Lucide untuk React Standalone
        const Icon = ({ name, size = 24, className = "" }) => {
            const [svg, setSvg] = React.useState("");
            React.useEffect(() => {
                if (window.lucide) {
                    const iconSvg = window.lucide.icons[name];
                    if (iconSvg) {
                        // Simple way to render lucide icons in this standalone setup
                        const element = document.createElement('div');
                        element.innerHTML = window.lucide.createIcons({
                            icons: { [name]: iconSvg },
                            attrs: { strokeWidth: 2, width: size, height: size, class: className }
                        });
                    }
                }
            }, [name, size, className]);
            
            // Menggunakan SVG mentah atau pendekatan elemen (untuk demo ini kita gunakan placeholder simpel atau lucide-react jika tersedia)
            // Namun karena ini UMD, kita gunakan cara paling kompatibel:
            return <i data-lucide={name} style={{width: size, height: size}} className={className}></i>;
        };

        // --- PASTE KODE LOGIKA ANDA DI SINI ---
        const { useState, useEffect } = React;

        // API Key: MASUKKAN KEY ANDA DI SINI
        const apiKey = ""; 

        const THEMES = {
            MINIMALIST: { id: 'minimalist', name: 'Minimalist', bg: 'bg-white', text: 'text-slate-900', accent: 'bg-slate-900', accentText: 'text-white', font: 'font-sans', card: 'bg-slate-50 border border-slate-200', button: 'rounded-none uppercase tracking-widest font-bold' },
            JAPANESE: { id: 'japanese', name: 'Japanese Style', bg: 'bg-[#FDFBF7]', text: 'text-[#2D2D2D]', accent: 'bg-[#BC002D]', accentText: 'text-white', font: 'font-serif', card: 'bg-white border-b-4 border-r-4 border-[#2D2D2D]', button: 'rounded-sm font-medium border-2 border-[#2D2D2D]' },
            VIBRANT: { id: 'vibrant', name: 'Vibrant / Food', bg: 'bg-orange-50', text: 'text-orange-950', accent: 'bg-orange-500', accentText: 'text-white', font: 'font-sans', card: 'bg-white shadow-xl rounded-3xl', button: 'rounded-full font-black' }
        };

        const App = () => {
            const [step, setStep] = useState('welcome');
            const [wizardStep, setWizardStep] = useState(0);
            const [formData, setFormData] = useState({ businessName: '', productName: '', targetMarket: '', price: '', benefits: '', whatsapp: '', paymentLink: '' });
            const [copy, setCopy] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState(THEMES.MINIMALIST);
            const [isGenerating, setIsGenerating] = useState(false);

            useEffect(() => {
                if (window.lucide) window.lucide.createIcons();
            }, [step, wizardStep]);

            const generateCopy = async () => {
                setIsGenerating(true);
                setStep('loading');
                const systemPrompt = `Expert Landing Page Copywriter. Output ONLY JSON. Keys: headline, subheadline, description, benefits (arr), testimonials (arr), cta_text, wa_message. Indonesian language.`;
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: JSON.stringify(formData) }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    const data = await response.json();
                    setCopy(JSON.parse(data.candidates[0].content.parts[0].text));
                    setStep('preview');
                } catch (err) { setStep('wizard'); } finally { setIsGenerating(false); }
            };

            const handleDownload = () => {
                const htmlContent = `<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>${formData.businessName}</title><script src="https://cdn.tailwindcss.com"><\/script><link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&display=swap" rel="stylesheet"><style>.font-sans{font-family:'Plus Jakarta Sans',sans-serif}</style></head><body class="${selectedTheme.bg} ${selectedTheme.text} font-sans"><div class="max-w-3xl mx-auto px-6 py-20 text-center space-y-12"><h1 class="text-5xl font-black">${copy.headline}</h1><p class="text-xl opacity-70">${copy.subheadline}</p><a href="https://wa.me/${formData.whatsapp}" class="inline-block px-12 py-5 ${selectedTheme.accent} ${selectedTheme.accentText} font-bold rounded-xl">${copy.cta_text}</a></div></body></html>`;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "index.html";
                a.click();
            };

            if (step === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 font-sans">
                    <div className="max-w-md w-full bg-white rounded-3xl p-10 shadow-2xl text-center space-y-6 border">
                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto text-white shadow-lg"><i data-lucide="wand-2"></i></div>
                        <h1 className="text-3xl font-black">LANDING GENERATOR</h1>
                        <p className="text-slate-500">Mulai buat landing page profesional Anda.</p>
                        <button onClick={() => setStep('wizard')} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg">Mulai Sekarang</button>
                    </div>
                </div>
            );

            if (step === 'wizard') return (
                <div className="min-h-screen flex items-center justify-center p-4 font-sans">
                    <div className="max-w-xl w-full bg-white rounded-3xl p-8 shadow-2xl space-y-6">
                        <h2 className="text-2xl font-black text-center">Isi Data Usaha</h2>
                        <input className="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2" placeholder="Nama Usaha" value={formData.businessName} onChange={e => setFormData({...formData, businessName: e.target.value})} />
                        <input className="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2" placeholder="Produk" value={formData.productName} onChange={e => setFormData({...formData, productName: e.target.value})} />
                        <input className="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2" placeholder="Harga" value={formData.price} onChange={e => setFormData({...formData, price: e.target.value})} />
                        <input className="w-full p-4 bg-slate-50 rounded-xl outline-none border focus:ring-2" placeholder="WhatsApp (62...)" value={formData.whatsapp} onChange={e => setFormData({...formData, whatsapp: e.target.value})} />
                        <button onClick={generateCopy} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-xl">Generate dengan AI</button>
                    </div>
                </div>
            );

            if (step === 'loading') return <div className="min-h-screen flex items-center justify-center font-sans"><p className="animate-pulse font-bold">AI sedang bekerja...</p></div>;

            return (
                <div className={`min-h-screen ${selectedTheme.bg} ${selectedTheme.text} ${selectedTheme.font}`}>
                    <div className="sticky top-0 bg-white/90 backdrop-blur p-4 flex justify-between border-b">
                        <div className="flex gap-2">
                            {Object.values(THEMES).map(t => <button key={t.id} onClick={() => setSelectedTheme(t)} className="px-3 py-1 bg-slate-100 rounded-full text-xs font-bold">{t.name}</button>)}
                        </div>
                        <button onClick={handleDownload} className="px-4 py-2 bg-green-600 text-white rounded-lg text-xs font-bold">DOWNLOAD HTML</button>
                    </div>
                    <div className="max-w-3xl mx-auto py-20 px-6 text-center space-y-12">
                        <h1 className="text-6xl font-black italic">{copy.headline}</h1>
                        <p className="text-xl opacity-70">{copy.subheadline}</p>
                        <button className={`px-10 py-5 ${selectedTheme.accent} ${selectedTheme.accentText} ${selectedTheme.button} shadow-xl`}>{copy.cta_text}</button>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
