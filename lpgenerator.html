<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Landing Page AI - Standalone</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Single File App -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        body { background-color: #f8fafc; margin: 0; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // API Key: MASUKKAN KEY ANDA DI SINI (Dapatkan di aistudio.google.com)
        const apiKey = "AIzaSyBui_AsdOK_4oU37EmLzg3zDdlzLotNV2g"; 

        const THEMES = {
            MINIMALIST: { id: 'minimalist', name: 'Minimalist', bg: 'bg-white', text: 'text-slate-900', accent: 'bg-slate-900', accentText: 'text-white', font: 'font-sans', card: 'bg-slate-50 border border-slate-200', button: 'rounded-none uppercase tracking-widest font-bold' },
            JAPANESE: { id: 'japanese', name: 'Japanese Style', bg: 'bg-[#FDFBF7]', text: 'text-[#2D2D2D]', accent: 'bg-[#BC002D]', accentText: 'text-white', font: 'font-serif', card: 'bg-white border-b-4 border-r-4 border-[#2D2D2D]', button: 'rounded-sm font-medium border-2 border-[#2D2D2D]' },
            VIBRANT: { id: 'vibrant', name: 'Vibrant / Food', bg: 'bg-orange-50', text: 'text-orange-950', accent: 'bg-orange-500', accentText: 'text-white', font: 'font-sans', card: 'bg-white shadow-xl rounded-3xl', button: 'rounded-full font-black' }
        };

        const App = () => {
            const [step, setStep] = useState('welcome');
            const [wizardStep, setWizardStep] = useState(0);
            const [formData, setFormData] = useState({ 
                businessName: '', 
                productName: '', 
                targetMarket: '', 
                price: '', 
                benefits: '', 
                whatsapp: '', 
                paymentLink: '' 
            });
            const [copy, setCopy] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState(THEMES.MINIMALIST);
            const [isGenerating, setIsGenerating] = useState(false);

            // Inisialisasi ulang ikon setiap kali langkah atau konten berubah
            useEffect(() => {
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [step, wizardStep, copy]);

            const generateCopy = async () => {
                if (!formData.businessName || !formData.productName) return;
                
                setIsGenerating(true);
                setStep('loading');
                
                const systemPrompt = `Expert Landing Page Copywriter. Output ONLY JSON. Keys: headline, subheadline, description, benefits (array of 3), testimonials (array of 2), cta_text, wa_message. Use persuasive Indonesian language.`;
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: JSON.stringify(formData) }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setCopy(result);
                    setStep('preview');
                } catch (err) { 
                    console.error(err);
                    // Fallback jika AI gagal
                    setCopy({
                        headline: `Dapatkan ${formData.productName} Sekarang!`,
                        subheadline: `Solusi terbaik untuk ${formData.targetMarket} dari ${formData.businessName}.`,
                        description: `Kami menghadirkan ${formData.productName} dengan kualitas premium untuk memenuhi kebutuhan Anda.`,
                        benefits: ["Kualitas Terjamin", "Layanan Cepat", "Harga Terjangkau"],
                        testimonials: ["Sangat puas dengan hasilnya!", "Pelayanan ramah dan profesional."],
                        cta_text: "Pesan Sekarang",
                        wa_message: `Halo ${formData.businessName}, saya tertarik dengan ${formData.productName}.`
                    });
                    setStep('preview');
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const handleDownload = () => {
                // Escaping closing script tags to avoid breaking Babel/HTML parser
                const htmlContent = `
<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width,initial-scale=1.0">
    <title>\${formData.businessName} - \${formData.productName}</title>
    <script src="https://cdn.tailwindcss.com"><\/script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">
    <style>
        .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        body { margin: 0; padding: 0; }
    </style>
</head>
<body class="\${selectedTheme.bg} \${selectedTheme.text} \${selectedTheme.font}">
    <div class="max-w-3xl mx-auto px-6 py-20 text-center space-y-16">
        <section class="space-y-8">
            <h1 class="text-5xl md:text-7xl font-black leading-tight tracking-tighter italic">\${copy.headline}</h1>
            <p class="text-xl opacity-70 max-w-2xl mx-auto">\${copy.subheadline}</p>
            <div class="pt-6">
                <a href="https://wa.me/\${formData.whatsapp}?text=\${encodeURIComponent(copy.wa_message)}" 
                   class="inline-block px-12 py-5 \${selectedTheme.accent} \${selectedTheme.accentText} \${selectedTheme.button} shadow-2xl transition-transform hover:scale-105">
                   \${copy.cta_text}
                </a>
                \${formData.price ? \`<p class="mt-6 font-bold text-2xl">\${formData.price}</p>\` : ''}
            </div>
        </section>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6 text-left">
            \${copy.benefits.map((b, i) => \`
                <div class="\${selectedTheme.card} p-8 rounded-2xl">
                    <div class="w-10 h-10 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold mb-4">\${i+1}</div>
                    <p class="font-bold text-lg">\${b}</p>
                </div>
            \`).join('')}
        </section>

        <footer class="opacity-40 text-sm border-t pt-10">
            <p>© \${new Date().getFullYear()} \${formData.businessName}</p>
        </footer>
    </div>
</body>
</html>`;
                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `landing-page-\${formData.businessName.toLowerCase().replace(/\\s+/g, '-')}.html`;
                a.click();
            };

            if (step === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 font-sans">
                    <div className="max-w-md w-full bg-white rounded-3xl p-10 shadow-2xl text-center space-y-6 border border-slate-100">
                        <div className="w-16 h-16 bg-indigo-600 rounded-2xl flex items-center justify-center mx-auto text-white shadow-lg">
                            <i data-lucide="wand-2"></i>
                        </div>
                        <h1 className="text-3xl font-black tracking-tighter">LANDING GENERATOR AI</h1>
                        <p className="text-slate-500">Ciptakan halaman jualan profesional dalam 60 detik.</p>
                        <button onClick={() => setStep('wizard')} className="w-full py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg hover:bg-indigo-700 transition-all">Mulai Sekarang</button>
                    </div>
                </div>
            );

            if (step === 'wizard') {
                const configs = [
                    { key: 'businessName', label: 'Apa nama usaha Anda?', placeholder: 'Contoh: Kopi Senja', icon: 'store' },
                    { key: 'productName', label: 'Apa produk/jasa utamanya?', placeholder: 'Contoh: Paket Kopi Literan', icon: 'package' },
                    { key: 'targetMarket', label: 'Siapa target pembelinya?', placeholder: 'Contoh: Mahasiswa & Pekerja Kantor', icon: 'users' },
                    { key: 'price', label: 'Berapa harganya?', placeholder: 'Contoh: Rp 25.000', icon: 'tag' },
                    { key: 'benefits', label: 'Apa keunggulan utamanya?', placeholder: 'Contoh: Tanpa Pengawet, Biji Asli', icon: 'check-circle' },
                    { key: 'whatsapp', label: 'Nomor WhatsApp Anda?', placeholder: 'Contoh: 628123456789', icon: <i data-lucide="phone"></i> }
                ];
                const current = configs[wizardStep];

                return (
                    <div className="min-h-screen flex items-center justify-center p-4 font-sans">
                        <div className="max-w-xl w-full bg-white rounded-3xl p-8 shadow-2xl space-y-8 animate-fade-in">
                            <div className="flex justify-between items-center h-1 bg-slate-100 rounded-full">
                                <div className="h-full bg-indigo-600 transition-all duration-500" style={{width: `${((wizardStep+1)/configs.length)*100}%`}}></div>
                            </div>
                            <div className="text-center space-y-4">
                                <h2 className="text-2xl font-black">{current.label}</h2>
                                <input 
                                    autoFocus
                                    className="w-full p-5 bg-slate-50 rounded-2xl outline-none border-2 border-transparent focus:border-indigo-500 text-xl font-semibold text-center transition-all" 
                                    placeholder={current.placeholder} 
                                    value={formData[current.key]} 
                                    onChange={e => setFormData({...formData, [current.key]: e.target.value})}
                                    onKeyDown={e => e.key === 'Enter' && (wizardStep < configs.length - 1 ? setWizardStep(v => v + 1) : generateCopy())}
                                />
                            </div>
                            <div className="flex gap-4">
                                <button onClick={() => wizardStep > 0 ? setWizardStep(v => v - 1) : setStep('welcome')} className="flex-1 py-4 font-bold text-slate-400">Kembali</button>
                                <button 
                                    onClick={() => wizardStep < configs.length - 1 ? setWizardStep(v => v + 1) : generateCopy()} 
                                    className="flex-[2] py-4 bg-indigo-600 text-white font-bold rounded-2xl shadow-lg"
                                >
                                    {wizardStep === configs.length - 1 ? 'Generate Sekarang' : 'Lanjut'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'loading') return (
                <div className="min-h-screen flex flex-col items-center justify-center font-sans space-y-4">
                    <div className="w-12 h-12 border-4 border-indigo-600 border-t-transparent rounded-full animate-spin"></div>
                    <p className="font-bold text-slate-600">AI sedang menulis kata-kata jualan Anda...</p>
                </div>
            );

            return (
                <div className={`min-h-screen \${selectedTheme.bg} \${selectedTheme.text} \${selectedTheme.font}`}>
                    <div className="sticky top-0 bg-white/90 backdrop-blur p-4 flex justify-between items-center border-b z-50">
                        <div className="flex gap-2">
                            {Object.values(THEMES).map(t => (
                                <button 
                                    key={t.id} 
                                    onClick={() => setSelectedTheme(t)} 
                                    className={`px-4 py-1.5 rounded-full text-xs font-bold transition-all \${selectedTheme.id === t.id ? 'bg-indigo-600 text-white shadow-md' : 'bg-slate-100 text-slate-500 hover:bg-slate-200'}`}
                                >
                                    {t.name}
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-2">
                            <button onClick={handleDownload} className="px-4 py-2 bg-green-600 text-white rounded-xl text-xs font-bold shadow-md flex items-center gap-2">
                                <i data-lucide="download" style={{width:14, height:14}}></i> DOWNLOAD HTML
                            </button>
                            <button onClick={() => setStep('welcome')} className="px-4 py-2 bg-slate-800 text-white rounded-xl text-xs font-bold">ULANGI</button>
                        </div>
                    </div>
                    
                    <div className="max-w-4xl mx-auto py-20 px-6 text-center space-y-16 animate-fade-in">
                        <section className="space-y-8">
                            <h1 className="text-5xl md:text-7xl font-black leading-tight tracking-tighter italic">{copy.headline}</h1>
                            <p className="text-xl md:text-2xl opacity-75 max-w-2xl mx-auto leading-relaxed">{copy.subheadline}</p>
                            <div className="pt-6">
                                <button className={`px-12 py-5 text-lg \${selectedTheme.accent} \${selectedTheme.accentText} \${selectedTheme.button} shadow-2xl transition-transform hover:scale-105 flex items-center gap-2 mx-auto`}>
                                    <i data-lucide="message-circle"></i> {copy.cta_text}
                                </button>
                                {formData.price && <p className="mt-8 text-3xl font-black tracking-tight">{formData.price}</p>}
                            </div>
                        </section>

                        <div className={`\${selectedTheme.card} p-10 md:p-16 rounded-[2.5rem] space-y-6 text-center`}>
                            <h3 className="text-2xl font-bold uppercase tracking-widest opacity-50">Tentang Kami</h3>
                            <p className="text-lg md:text-xl leading-relaxed opacity-80">{copy.description}</p>
                        </div>

                        <section className="grid grid-cols-1 md:grid-cols-3 gap-8">
                            {copy.benefits.map((b, i) => (
                                <div key={i} className={`\${selectedTheme.card} p-10 rounded-3xl text-left space-y-4 hover:translate-y-[-5px] transition-transform`}>
                                    <div className="w-12 h-12 bg-indigo-600 text-white rounded-2xl flex items-center justify-center shadow-lg">
                                        <i data-lucide="check"></i>
                                    </div>
                                    <p className="font-bold text-xl leading-tight">{b}</p>
                                </div>
                            ))}
                        </section>

                        <section className="space-y-12">
                            <h3 className="text-2xl font-black opacity-30 uppercase tracking-[0.3em]">Apa Kata Mereka</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-8">
                                {copy.testimonials.map((t, i) => (
                                    <div key={i} className="bg-white/40 p-10 rounded-[3rem] border border-current/5 italic relative text-left">
                                        <p className="text-xl leading-relaxed">"{t}"</p>
                                        <div className="mt-6 flex items-center gap-3 not-italic">
                                            <div className="w-10 h-10 rounded-full bg-slate-200"></div>
                                            <span className="font-bold text-sm opacity-50">Pelanggan Puas</span>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <footer className="opacity-40 text-sm border-t pt-10 pb-20">
                            <p>© {new Date().getFullYear()} {formData.businessName}. Dibuat dengan AI.</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
