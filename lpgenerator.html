<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Generator Landing Page AI - Standalone Premium</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & Babel for Single File App -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+JP:wght@900&family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        .font-sans { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Noto Serif JP', serif; }
        body { background-color: #f8fafc; margin: 0; min-height: 100vh; }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        #root { min-height: 100vh; }
        .glass { background: rgba(255, 255, 255, 0.8); backdrop-filter: blur(10px); }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        // PENTING: Masukkan API Key Anda di sini
        const apiKey = "AIzaSyBui_AsdOK_4oU37EmLzg3zDdlzLotNV2g"; 

        // Komponen Ikon untuk mencegah konflik DOM antara React dan Lucide
        const LucideIcon = ({ name, size = 24, className = "" }) => {
            const iconRef = useRef(null);

            useEffect(() => {
                if (window.lucide && iconRef.current) {
                    iconRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({
                        root: iconRef.current,
                        attrs: {
                            width: size,
                            height: size,
                            class: className
                        }
                    });
                }
            }, [name, size, className]);

            return <span ref={iconRef} className="inline-flex items-center justify-center"></span>;
        };

        const THEMES = {
            MINIMALIST: { 
                id: 'minimalist', 
                name: 'Minimalist', 
                bg: 'bg-white', 
                text: 'text-slate-900', 
                accent: 'bg-slate-900', 
                accentText: 'text-white', 
                font: 'font-sans', 
                card: 'bg-slate-50 border border-slate-200', 
                button: 'rounded-none uppercase tracking-widest font-bold' 
            },
            JAPANESE: { 
                id: 'japanese', 
                name: 'Japanese Style', 
                bg: 'bg-[#FDFBF7]', 
                text: 'text-[#2D2D2D]', 
                accent: 'bg-[#BC002D]', 
                accentText: 'text-white', 
                font: 'font-serif', 
                card: 'bg-white border-b-4 border-r-4 border-[#2D2D2D]', 
                button: 'rounded-sm font-medium border-2 border-[#2D2D2D]' 
            },
            VIBRANT: { 
                id: 'vibrant', 
                name: 'Food / Travel', 
                bg: 'bg-orange-50', 
                text: 'text-orange-950', 
                accent: 'bg-orange-500', 
                accentText: 'text-white', 
                font: 'font-sans', 
                card: 'bg-white shadow-xl rounded-3xl', 
                button: 'rounded-full font-black' 
            }
        };

        const App = () => {
            const [step, setStep] = useState('welcome');
            const [wizardStep, setWizardStep] = useState(0);
            const [formData, setFormData] = useState({ 
                businessName: '', 
                productName: '', 
                targetMarket: '', 
                price: '', 
                benefits: '', 
                whatsapp: '', 
                paymentLink: '',
                category: 'business'
            });
            const [copy, setCopy] = useState(null);
            const [selectedTheme, setSelectedTheme] = useState(THEMES.MINIMALIST);
            const [isGenerating, setIsGenerating] = useState(false);

            const handleManualPreview = () => {
                setCopy({
                    headline: `Solusi Terbaik untuk ${formData.productName}`,
                    subheadline: `Membantu ${formData.targetMarket} mendapatkan hasil maksimal dengan ${formData.businessName}.`,
                    description: `Kami di ${formData.businessName} berkomitmen memberikan kualitas terbaik untuk setiap pelanggan kami.`,
                    benefits: ["Kualitas Premium", "Pelayanan 24/7", "Harga Kompetitif"],
                    testimonials: ["Produk yang luar biasa!", "Sangat merekomendasikan layanan ini."],
                    cta_text: "Hubungi Kami Sekarang",
                    wa_message: `Halo ${formData.businessName}, saya ingin tahu lebih lanjut tentang ${formData.productName}.`
                });
                setStep('preview');
            };

            const generateCopy = async () => {
                if (!formData.businessName || !formData.productName) return;
                
                setIsGenerating(true);
                setStep('loading');
                
                const systemPrompt = "Expert Landing Page Copywriter. Output ONLY JSON. Keys: headline, subheadline, description, benefits (array of 3), testimonials (array of 2), cta_text, wa_message. Use persuasive Indonesian language.";
                
                try {
                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: [{ text: JSON.stringify(formData) }] }],
                            systemInstruction: { parts: [{ text: systemPrompt }] },
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });
                    
                    if (!response.ok) throw new Error('API Error');
                    const data = await response.json();
                    const result = JSON.parse(data.candidates[0].content.parts[0].text);
                    setCopy(result);
                    setStep('preview');
                } catch (err) { 
                    console.error("AI Error:", err);
                    handleManualPreview();
                } finally { 
                    setIsGenerating(false); 
                }
            };

            const handleDownload = () => {
                if (!copy) return;
                
                const imageUrl = "https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=1200&q=80";
                
                let htmlContent = '<!DOCTYPE html>\n<html lang="id">\n<head>\n';
                htmlContent += '<meta charset="UTF-8">\n<meta name="viewport" content="width=device-width,initial-scale=1.0">\n';
                htmlContent += '<title>' + formData.businessName + ' | ' + formData.productName + '</title>\n';
                htmlContent += '<script src="https://cdn.tailwindcss.com"><\/script>\n';
                htmlContent += '<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;800&family=Noto+Serif+JP:wght@900&display=swap" rel="stylesheet">\n';
                htmlContent += '<style>.font-sans{font-family:"Plus Jakarta Sans",sans-serif}.font-serif{font-family:"Noto Serif JP",serif}body{margin:0;padding:0;scroll-behavior:smooth}</style>\n';
                htmlContent += '</head>\n<body class="' + selectedTheme.bg + ' ' + selectedTheme.text + ' ' + selectedTheme.font + '">\n';
                
                htmlContent += '<nav class="p-6 flex justify-between items-center max-w-6xl mx-auto"><span class="font-black text-xl uppercase tracking-tighter">' + formData.businessName + '</span></nav>';

                htmlContent += '<section class="max-w-6xl mx-auto px-6 py-20 grid md:grid-cols-2 gap-12 items-center">';
                htmlContent += '<div class="space-y-8 text-center md:text-left">';
                htmlContent += '<h1 class="text-5xl md:text-7xl font-black leading-tight italic tracking-tighter">' + copy.headline + '</h1>';
                htmlContent += '<p class="text-xl opacity-75">' + copy.subheadline + '</p>';
                htmlContent += '<div class="pt-4">';
                htmlContent += '<a href="https://wa.me/' + formData.whatsapp + '?text=' + encodeURIComponent(copy.wa_message) + '" class="inline-block px-12 py-5 ' + selectedTheme.accent + ' ' + selectedTheme.accentText + ' ' + selectedTheme.button + ' shadow-2xl transition-transform hover:scale-105">' + copy.cta_text + '</a>';
                if(formData.price) htmlContent += '<p class="mt-6 font-bold text-3xl">' + formData.price + '</p>';
                htmlContent += '</div></div>';
                htmlContent += '<div class="hidden md:block"><img src="' + imageUrl + '" alt="Hero" class="rounded-3xl shadow-2xl grayscale hover:grayscale-0 transition-all duration-700"></div>';
                htmlContent += '</section>\n';

                htmlContent += '<section class="py-24 ' + selectedTheme.card + '"><div class="max-w-4xl mx-auto px-6 text-center space-y-8">';
                htmlContent += '<h2 class="text-3xl font-black uppercase tracking-widest">Tentang Kami</h2>';
                htmlContent += '<p class="text-2xl leading-relaxed opacity-80">' + copy.description + '</p></div></section>';

                htmlContent += '<section class="max-w-6xl mx-auto px-6 py-24"><div class="grid grid-cols-1 md:grid-cols-3 gap-8">';
                copy.benefits.forEach((b, i) => {
                    htmlContent += '<div class="' + selectedTheme.card + ' p-10 rounded-3xl space-y-6"><div class="w-12 h-12 bg-indigo-600 text-white rounded-full flex items-center justify-center font-bold text-xl">' + (i+1) + '</div><p class="font-black text-xl leading-tight">' + b + '</p></div>';
                });
                htmlContent += '</div></section>\n';

                htmlContent += '<footer class="opacity-40 text-sm border-t py-12 text-center"><p>© ' + new Date().getFullYear() + ' ' + formData.businessName + '</p></footer>\n';
                htmlContent += '</body>\n</html>';

                const blob = new Blob([htmlContent], { type: 'text/html' });
                const url = URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = "landing-page.html";
                a.click();
                URL.revokeObjectURL(url);
            };

            if (step === 'welcome') return (
                <div className="min-h-screen flex items-center justify-center p-6 font-sans">
                    <div className="max-w-md w-full bg-white rounded-[2.5rem] p-12 shadow-2xl text-center space-y-8 border border-slate-100 animate-fade-in">
                        <div className="w-20 h-20 bg-slate-900 rounded-3xl flex items-center justify-center mx-auto text-white shadow-xl rotate-6">
                            <LucideIcon name="sparkles" size={40} />
                        </div>
                        <div className="space-y-2">
                            <h1 className="text-4xl font-black tracking-tighter uppercase leading-none">Gen-Page <span className="text-indigo-600">Pro</span></h1>
                            <p className="text-slate-400 font-medium">Bikin landing page estetik dalam sekejap.</p>
                        </div>
                        <button onClick={() => setStep('wizard')} className="w-full py-5 bg-slate-900 text-white font-black rounded-2xl shadow-xl hover:bg-indigo-600 transition-all hover:scale-105">Mulai Sekarang</button>
                    </div>
                </div>
            );

            if (step === 'wizard') {
                const configs = [
                    { key: 'businessName', label: 'Apa nama brand Anda?', placeholder: 'Contoh: Sora Coffee', icon: 'store' },
                    { key: 'productName', label: 'Produk/Jasa apa yang dijual?', placeholder: 'Contoh: Signature Latte', icon: 'package' },
                    { key: 'targetMarket', label: 'Siapa calon pembelinya?', placeholder: 'Contoh: Pekerja Kreatif', icon: 'users' },
                    { key: 'price', label: 'Berapa harganya?', placeholder: 'Contoh: Rp 35.000', icon: 'tag' },
                    { key: 'benefits', label: 'Sebutkan 1 keunggulan utama', placeholder: 'Contoh: Biji Kopi Organik', icon: 'check-circle' },
                    { key: 'whatsapp', label: 'Nomor WhatsApp (62...)', placeholder: '628123456789', icon: 'phone' }
                ];
                const current = configs[wizardStep];

                return (
                    <div className="min-h-screen flex items-center justify-center p-4 font-sans bg-slate-50">
                        <div className="max-w-xl w-full bg-white rounded-[3rem] p-10 md:p-14 shadow-2xl space-y-10 animate-fade-in relative overflow-hidden">
                            <div className="absolute top-0 left-0 w-full h-2 bg-slate-100">
                                <div className="h-full bg-slate-900 transition-all duration-500" style={{width: `${((wizardStep+1)/configs.length)*100}%`}}></div>
                            </div>
                            <div className="text-center space-y-8">
                                <div className="w-16 h-16 bg-slate-50 rounded-2xl flex items-center justify-center mx-auto text-slate-400">
                                    <LucideIcon name={current.icon} />
                                </div>
                                <h2 className="text-3xl font-black tracking-tight">{current.label}</h2>
                                <input 
                                    autoFocus
                                    className="w-full p-6 bg-slate-50 rounded-3xl border-2 border-transparent focus:border-slate-900 text-2xl font-bold text-center outline-none transition-all shadow-inner" 
                                    placeholder={current.placeholder} 
                                    value={formData[current.key]} 
                                    onChange={e => setFormData({...formData, [current.key]: e.target.value})}
                                    onKeyDown={e => e.key === 'Enter' && (wizardStep < configs.length - 1 ? setWizardStep(v => v + 1) : generateCopy())}
                                />
                            </div>
                            <div className="flex gap-4 pt-4">
                                <button onClick={() => wizardStep > 0 ? setWizardStep(v => v - 1) : setStep('welcome')} className="flex-1 py-4 font-bold text-slate-400 hover:text-slate-600 transition-colors">Kembali</button>
                                <button onClick={() => wizardStep < configs.length - 1 ? setWizardStep(v => v + 1) : generateCopy()} className="flex-[2] py-5 bg-slate-900 text-white font-black rounded-3xl shadow-lg hover:bg-indigo-600 transition-all">
                                    {wizardStep === configs.length - 1 ? 'Generate Preview' : 'Lanjut'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            if (step === 'loading') return (
                <div className="min-h-screen flex flex-col items-center justify-center space-y-6 font-sans bg-white">
                    <div className="relative">
                        <div className="w-20 h-20 border-8 border-slate-100 border-t-slate-900 rounded-full animate-spin"></div>
                        <div className="absolute inset-0 flex items-center justify-center"><LucideIcon name="cpu" className="text-slate-900 animate-pulse" /></div>
                    </div>
                    <p className="font-black text-2xl tracking-tighter animate-pulse uppercase">AI Sedang Merancang...</p>
                </div>
            );

            return (
                <div className={`min-h-screen ${selectedTheme.bg} ${selectedTheme.text} ${selectedTheme.font} transition-all duration-700`}>
                    <div className="sticky top-0 glass p-4 flex flex-wrap justify-between items-center border-b z-50 gap-4">
                        <div className="flex gap-3">
                            {Object.values(THEMES).map(t => (
                                <button 
                                    key={t.id} 
                                    onClick={() => setSelectedTheme(t)} 
                                    className={`px-5 py-2.5 rounded-2xl text-xs font-black transition-all ${selectedTheme.id === t.id ? 'bg-slate-900 text-white shadow-xl scale-105' : 'bg-white text-slate-400 border border-slate-100 hover:bg-slate-50'}`}
                                >
                                    {t.name}
                                </button>
                            ))}
                        </div>
                        <div className="flex gap-3">
                            <button onClick={handleDownload} className="px-6 py-3 bg-indigo-600 text-white rounded-2xl text-xs font-black shadow-xl hover:bg-indigo-700 hover:scale-105 transition-all flex items-center gap-2">
                                <LucideIcon name="download" size={16} /> DOWNLOAD HTML
                            </button>
                            <button onClick={() => setStep('welcome')} className="px-5 py-3 bg-slate-100 text-slate-600 rounded-2xl text-xs font-bold hover:bg-slate-200">EDIT</button>
                        </div>
                    </div>
                    
                    <div className="animate-fade-in">
                        <section className="max-w-6xl mx-auto px-6 py-24 grid md:grid-cols-2 gap-16 items-center">
                            <div className="space-y-10 text-center md:text-left">
                                <span className="px-4 py-2 bg-indigo-50 text-indigo-600 font-black text-xs uppercase tracking-widest rounded-full">{formData.businessName}</span>
                                <h1 className="text-5xl md:text-8xl font-black leading-[0.95] tracking-tighter italic">{copy.headline}</h1>
                                <p className="text-xl md:text-2xl opacity-70 max-w-xl leading-relaxed">{copy.subheadline}</p>
                                <div className="pt-6">
                                    <button onClick={() => window.open(`https://wa.me/${formData.whatsapp}`)} className={`px-14 py-6 text-xl ${selectedTheme.accent} ${selectedTheme.accentText} ${selectedTheme.button} shadow-[0_20px_50px_rgba(0,0,0,0.1)] hover:scale-105 transition-all flex items-center gap-3 mx-auto md:mx-0`}>
                                        <LucideIcon name="message-circle" /> {copy.cta_text}
                                    </button>
                                    {formData.price && <p className="mt-8 text-4xl font-black tracking-tight opacity-90">{formData.price}</p>}
                                </div>
                            </div>
                            <div className="relative group">
                                <div className="absolute inset-0 bg-indigo-600 rounded-[3rem] rotate-3 -z-10 opacity-10 group-hover:rotate-6 transition-transform"></div>
                                <img 
                                    src="https://images.unsplash.com/photo-1497366216548-37526070297c?auto=format&fit=crop&w=800&q=80" 
                                    className="rounded-[3rem] shadow-2xl grayscale group-hover:grayscale-0 transition-all duration-1000"
                                    alt="Preview"
                                />
                            </div>
                        </section>

                        <section className={`py-32 ${selectedTheme.card} overflow-hidden relative`}>
                            <div className="absolute top-0 left-0 w-64 h-64 bg-indigo-500/5 rounded-full -translate-x-32 -translate-y-32"></div>
                            <div className="max-w-4xl mx-auto px-6 text-center space-y-10 relative z-10">
                                <h3 className="text-2xl font-black opacity-20 uppercase tracking-[0.5em]">The Vision</h3>
                                <p className="text-2xl md:text-4xl font-bold leading-tight tracking-tight">{copy.description}</p>
                            </div>
                        </section>

                        <section className="max-w-6xl mx-auto px-6 py-32 space-y-20">
                            <div className="text-center space-y-4">
                                <h3 className="text-4xl font-black tracking-tighter">Kenapa Harus Kami?</h3>
                                <div className="w-20 h-2 bg-indigo-600 mx-auto rounded-full"></div>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-10">
                                {copy.benefits.map((b, i) => (
                                    <div key={i} className={`${selectedTheme.card} p-12 rounded-[2.5rem] space-y-6 hover:shadow-2xl transition-all border-none group`}>
                                        <div className="w-16 h-16 bg-slate-900 text-white rounded-2xl flex items-center justify-center shadow-lg rotate-3 group-hover:rotate-0 transition-transform">
                                            <LucideIcon name="star" />
                                        </div>
                                        <p className="font-black text-2xl leading-tight tracking-tight">{b}</p>
                                    </div>
                                ))}
                            </div>
                        </section>

                        <section className="bg-slate-900 text-white py-32">
                            <div className="max-w-6xl mx-auto px-6 space-y-20">
                                <h3 className="text-3xl font-black text-center tracking-widest opacity-50 uppercase">Testimonials</h3>
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-12">
                                    {copy.testimonials.map((t, i) => (
                                        <div key={i} className="space-y-6 p-8 border-l-2 border-white/20">
                                            <p className="text-2xl md:text-3xl font-medium leading-relaxed italic">"{t}"</p>
                                            <div className="flex items-center gap-4">
                                                <div className="w-12 h-12 rounded-full bg-indigo-500"></div>
                                                <span className="font-black uppercase tracking-widest text-xs">Verified Customer</span>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </section>

                        <footer className="py-20 text-center opacity-30 text-xs font-bold uppercase tracking-[0.3em]">
                            <p>© {new Date().getFullYear()} {formData.businessName} • Powering Success</p>
                        </footer>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
