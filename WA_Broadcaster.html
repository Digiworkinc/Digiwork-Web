<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WA Broadcaster - Installable</title>
    
    <!-- PWA Meta Tags -->
    <meta name="theme-color" content="#16a34a">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="description" content="Kirim pesan WhatsApp massal dengan mudah dan aman.">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; -webkit-tap-highlight-color: transparent; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #f1f1f1; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #888; border-radius: 10px; }
        
        /* Animasi untuk tombol kirim yang sudah diklik */
        .sent-item { opacity: 0.6; filter: grayscale(1); transition: all 0.3s ease; }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-900 pb-10">

    <!-- App Bar (Mobile Style) -->
    <nav class="bg-green-600 text-white p-4 sticky top-0 z-50 shadow-md flex justify-between items-center">
        <div class="flex items-center gap-2">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" fill="currentColor" viewBox="0 0 16 16">
                <path d="M13.601 2.326A7.854 7.854 0 0 0 7.994 0C3.627 0 .068 3.558.064 7.926c0 1.399.366 2.76 1.057 3.965L0 16l4.204-1.102a7.933 7.933 0 0 0 3.79.965h.004c4.368 0 7.926-3.558 7.93-7.93A7.898 7.898 0 0 0 13.6 2.326zM7.994 14.521a6.573 6.573 0 0 1-3.356-.92l-.24-.144-2.494.654.666-2.433-.156-.251a6.56 6.56 0 0 1-1.007-3.505c0-3.626 2.957-6.584 6.591-6.584a6.56 6.56 0 0 1 4.66 1.931 6.557 6.557 0 0 1 1.928 4.66c-.004 3.639-2.961 6.592-6.592 6.592zm3.615-4.934c-.197-.099-1.17-.578-1.353-.646-.182-.065-.315-.099-.445.099-.133.197-.513.646-.627.775-.114.133-.232.148-.43.05-.197-.1-.836-.308-1.592-.985-.59-.525-.985-1.175-1.103-1.372-.114-.198-.011-.304.088-.403.087-.088.197-.232.296-.346.1-.114.133-.198.198-.33.065-.134.034-.248-.015-.347-.05-.099-.445-1.076-.612-1.47-.16-.389-.323-.335-.445-.34-.114-.007-.247-.007-.38-.007a.729.729 0 0 0-.529.247c-.182.198-.691.677-.691 1.654 0 .977.71 1.916.81 2.049.098.133 1.394 2.132 3.383 2.992.47.205.84.326 1.129.418.475.152.904.129 1.246.08.38-.058 1.171-.48 1.338-.943.164-.464.164-.86.114-.943-.049-.084-.182-.133-.38-.232z"/>
            </svg>
            <span class="font-bold tracking-tight">WA Blast</span>
        </div>
        <button id="installBtn" class="hidden bg-white/20 hover:bg-white/30 text-xs px-3 py-1.5 rounded-full font-medium transition-all">
            Instal App
        </button>
    </nav>

    <div class="max-w-4xl mx-auto px-4 mt-6">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
            
            <!-- Area Input -->
            <section class="space-y-4">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200">
                    <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider mb-4">Konfigurasi Pesan</h2>
                    
                    <div class="space-y-4">
                        <div>
                            <label class="block text-sm font-semibold mb-1.5 text-slate-700">Daftar Nomor</label>
                            <textarea id="phoneNumbers" rows="6" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-sm" placeholder="Contoh:&#10;08123456789&#10;08998877665"></textarea>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold mb-1.5 text-slate-700">Pesan</label>
                            <textarea id="messageBody" rows="4" class="w-full p-3 bg-slate-50 border border-slate-200 rounded-xl focus:ring-2 focus:ring-green-500 focus:border-green-500 outline-none transition-all text-sm" placeholder="Tulis pesan Anda di sini..."></textarea>
                        </div>

                        <button onclick="generateList()" class="w-full bg-green-600 hover:bg-green-700 text-white font-bold py-3.5 rounded-xl transition-all shadow-lg shadow-green-100 active:scale-[0.98]">
                            Buat Antrean Kirim
                        </button>
                    </div>
                </div>

                <!-- Info Box -->
                <div class="bg-blue-50 p-4 rounded-xl border border-blue-100 flex gap-3">
                    <div class="text-blue-500 pt-0.5">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" fill="currentColor" viewBox="0 0 16 16">
                            <path d="M8 16A8 8 0 1 0 8 0a8 8 0 0 0 0 16zm.93-9.412-1 4.705c-.07.34.029.533.304.533.194 0 .487-.07.686-.246l-.088.416c-.287.346-.92.598-1.465.598-.703 0-1.002-.422-.808-1.319l.738-3.468c.064-.293.006-.399-.287-.47l-.451-.081.082-.381 2.29-.287zM8 5.5a1 1 0 1 1 0-2 1 1 0 0 1 0 2z"/>
                        </svg>
                    </div>
                    <p class="text-xs text-blue-700 leading-relaxed">
                        Aplikasi ini menggunakan <b>WhatsApp Click-to-Chat</b>. Aman dari blokir karena setiap pesan dikonfirmasi oleh Anda secara manual.
                    </p>
                </div>
            </section>

            <!-- Area Antrean -->
            <section class="flex flex-col">
                <div class="bg-white p-5 rounded-2xl shadow-sm border border-slate-200 flex-grow flex flex-col min-h-[400px]">
                    <div class="flex items-center justify-between mb-4">
                        <h2 class="text-sm font-bold text-slate-500 uppercase tracking-wider">Antrean Kirim</h2>
                        <span id="counter" class="bg-green-100 text-green-700 text-[10px] font-bold px-2 py-0.5 rounded-full">0 Nomor</span>
                    </div>

                    <div id="broadcastList" class="space-y-2 flex-grow overflow-y-auto max-h-[600px] pr-1 custom-scrollbar">
                        <!-- Placeholder -->
                        <div class="flex flex-col items-center justify-center py-20 text-slate-300">
                            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" fill="currentColor" viewBox="0 0 16 16" class="opacity-20 mb-3">
                                <path d="M15.964.686a.5.5 0 0 0-.65-.65L.767 5.855H.766l-.452.18a.5.5 0 0 0-.082.887l.41.26.001.002 4.995 3.178 3.178 4.995.002.001.26.41a.5.5 0 0 0 .886-.083l6-15Zm-1.833 1.89L6.637 10.07l-.215-.338a.5.5 0 0 0-.154-.154l-.338-.215 7.494-7.494 1.178-.471-.47 1.178Z"/>
                            </svg>
                            <p class="text-sm">Belum ada daftar kirim</p>
                        </div>
                    </div>
                </div>
            </section>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="fixed bottom-6 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-5 py-3 rounded-2xl shadow-2xl transition-all duration-300 opacity-0 pointer-events-none z-[60] text-sm">
        Pesan
    </div>

    <script>
        // --- PWA Logic ---
        let deferredPrompt;
        const installBtn = document.getElementById('installBtn');

        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
            installBtn.classList.remove('hidden');
        });

        installBtn.addEventListener('click', async () => {
            if (!deferredPrompt) return;
            deferredPrompt.prompt();
            const { outcome } = await deferredPrompt.userChoice;
            if (outcome === 'accepted') {
                installBtn.classList.add('hidden');
            }
            deferredPrompt = null;
        });

        // Registering a "Virtual" Service Worker to enable installation
        if ('serviceWorker' in navigator) {
            const swCode = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('fetch', (e) => e.respondWith(fetch(e.request)));
            `;
            const blob = new Blob([swCode], { type: 'application/javascript' });
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl).catch(() => {});
        }

        // Generate Manifest dynamically
        const manifest = {
            "name": "WA Broadcaster",
            "short_name": "WABlast",
            "start_url": ".",
            "display": "standalone",
            "background_color": "#f8fafc",
            "theme_color": "#16a34a",
            "icons": [
                {
                    "src": "https://cdn-icons-png.flaticon.com/512/733/733585.png",
                    "sizes": "512x512",
                    "type": "image/png",
                    "purpose": "any maskable"
                }
            ]
        };
        const stringManifest = JSON.stringify(manifest);
        const blob = new Blob([stringManifest], {type: 'application/json'});
        const manifestURL = URL.createObjectURL(blob);
        document.querySelector('head').insertAdjacentHTML('beforeend', `<link rel="manifest" href="${manifestURL}">`);

        // --- App Logic ---

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.innerText = msg;
            toast.classList.remove('opacity-0');
            setTimeout(() => toast.classList.add('opacity-0'), 2500);
        }

        function formatNumber(phone) {
            let cleaned = phone.replace(/\D/g, '');
            if (cleaned.startsWith('0')) cleaned = '62' + cleaned.substring(1);
            return (cleaned.length >= 10) ? cleaned : null;
        }

        function generateList() {
            const phoneInput = document.getElementById('phoneNumbers').value;
            const message = encodeURIComponent(document.getElementById('messageBody').value);
            const container = document.getElementById('broadcastList');
            const counterLabel = document.getElementById('counter');

            const lines = phoneInput.split('\n');
            const validItems = [];

            lines.forEach(line => {
                const trimmed = line.trim();
                if (trimmed) {
                    const formatted = formatNumber(trimmed);
                    if (formatted) validItems.push({ original: trimmed, formatted });
                }
            });

            if (validItems.length === 0) {
                showToast("Masukkan nomor yang valid!");
                return;
            }

            container.innerHTML = '';
            counterLabel.innerText = `${validItems.length} Nomor`;

            validItems.forEach((item, idx) => {
                const row = document.createElement('div');
                row.className = "flex items-center justify-between p-3.5 bg-slate-50 border border-slate-200 rounded-xl transition-all";
                row.innerHTML = `
                    <div class="flex flex-col">
                        <span class="text-xs font-bold text-slate-400">#${idx + 1}</span>
                        <span class="text-sm font-semibold text-slate-700">${item.original}</span>
                    </div>
                    <button onclick="sendWA('${item.formatted}', '${message}', this)" class="bg-green-500 hover:bg-green-600 text-white text-xs font-bold px-4 py-2 rounded-lg transition-all shadow-sm">
                        Kirim
                    </button>
                `;
                container.appendChild(row);
            });

            showToast(`${validItems.length} nomor siap dikirim.`);
        }

        function sendWA(phone, msg, btn) {
            const url = `https://wa.me/${phone}?text=${msg}`;
            window.open(url, '_blank');
            
            // Mark as sent
            const parent = btn.parentElement;
            parent.classList.add('sent-item');
            btn.innerHTML = "✓ Buka";
            btn.classList.replace('bg-green-500', 'bg-slate-300');
            btn.classList.replace('hover:bg-green-600', 'hover:bg-slate-300');
        }
    </script>
</body>
</html>
