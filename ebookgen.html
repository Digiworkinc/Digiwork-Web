<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lumina Story AI - Standalone</title>
    
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & Babel CDN -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&family=Playfair+Display:ital,wght@0,700;1,400&display=swap" rel="stylesheet">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .font-serif { font-family: 'Playfair Display', serif; }
        
        @media print {
            .no-print { display: none !important; }
            .print-only { display: block !important; }
            body { background: white !important; margin: 0 !important; }
            .page-break { page-break-after: always; break-after: page; height: 100vh; display: flex; flex-direction: column; }
            @page { size: A4 portrait; margin: 0; }
        }

        /* Animasi Kustom */
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in { animation: fadeIn 0.5s ease-out forwards; }
    </style>
</head>
<body class="bg-stone-50 text-slate-900">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Komponen Ikon SVG ---
        const IconBook = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"/><path d="M8 7h6"/><path d="M8 11h8"/></svg>;
        const IconSparkles = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m12 3-1.912 5.813a2 2 0 0 1-1.275 1.275L3 12l5.813 1.912a2 2 0 0 1 1.275 1.275L12 21l1.912-5.813a2 2 0 0 1 1.275-1.275L21 12l-5.813-1.912a2 2 0 0 1-1.275-1.275L12 3Z"/><path d="M5 3v4"/><path d="M19 17v4"/><path d="M3 5h4"/><path d="M17 19h4"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>;

        const App = () => {
            const [story, setStory] = useState("");
            const [apiKey, setApiKey] = useState(localStorage.getItem('gemini_api_key') || "");
            const [isGenerating, setIsGenerating] = useState(false);
            const [currentPage, setCurrentPage] = useState(0);
            const [ebookData, setEbookData] = useState(null);
            const [renderSteps, setRenderSteps] = useState([]);
            const [error, setError] = useState(null);

            // Update model names to standard public models
            const TEXT_MODEL = "gemini-1.5-flash";
            const IMAGE_MODEL = "imagen-3.0-generate-001";

            useEffect(() => {
                localStorage.setItem('gemini_api_key', apiKey.trim());
            }, [apiKey]);

            const fetchWithRetry = async (url, options, retries = 5, backoff = 1000) => {
                try {
                    const response = await fetch(url, options);
                    if (!response.ok) {
                        const errorBody = await response.json().catch(() => ({}));
                        const message = errorBody.error?.message || `HTTP ${response.status}`;
                        throw new Error(message);
                    }
                    return await response.json();
                } catch (err) {
                    if (retries > 0 && (err.message.includes('429') || err.message.includes('503') || err.message === 'Failed to fetch')) {
                        await new Promise(resolve => setTimeout(resolve, backoff));
                        return fetchWithRetry(url, options, retries - 1, backoff * 2);
                    }
                    throw err;
                }
            };

            const generateEbook = async () => {
                const trimmedKey = apiKey.trim();
                if (!story.trim() || !trimmedKey) {
                    setError("Harap isi cerita dan API Key terlebih dahulu.");
                    return;
                }
                
                setIsGenerating(true);
                setError(null);
                setRenderSteps(Array(6).fill({ status: 'pending', text: 'Menyiapkan adegan...' }));

                try {
                    const systemPrompt = `Bagi cerita menjadi tepat 6 segmen narasi dengan prompt gambar detail yang konsisten (gaya: Digital Illustration, Storybook Style). Kembalikan JSON murni: { "title": "Judul", "segments": [{ "text": "Narasi", "imagePrompt": "Prompt visual detail" }] }`;

                    // 1. Generate Text Content
                    const textResponse = await fetchWithRetry(
                        `https://generativelanguage.googleapis.com/v1beta/models/${TEXT_MODEL}:generateContent?key=${trimmedKey}`,
                        {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({
                                contents: [{ parts: [{ text: story }] }],
                                systemInstruction: { parts: [{ text: systemPrompt }] },
                                generationConfig: { responseMimeType: "application/json" }
                            })
                        }
                    );

                    const analyzedData = JSON.parse(textResponse.candidates[0].content.parts[0].text);
                    setRenderSteps(analyzedData.segments.map(s => ({ ...s, status: 'queued', imageUrl: null })));

                    // 2. Generate Images
                    const finalPages = [];
                    for (let i = 0; i < analyzedData.segments.length; i++) {
                        setRenderSteps(prev => prev.map((s, idx) => idx === i ? { ...s, status: 'rendering' } : s));
                        try {
                            const imgResponse = await fetchWithRetry(
                                `https://generativelanguage.googleapis.com/v1beta/models/${IMAGE_MODEL}:predict?key=${trimmedKey}`,
                                {
                                    method: 'POST',
                                    headers: { 'Content-Type': 'application/json' },
                                    body: JSON.stringify({
                                        instances: { prompt: analyzedData.segments[i].imagePrompt },
                                        parameters: { sampleCount: 1 }
                                    })
                                }
                            );
                            
                            const base64Image = `data:image/png;base64,${imgResponse.predictions[0].bytesBase64Encoded}`;
                            setRenderSteps(prev => prev.map((s, idx) => idx === i ? { ...s, status: 'completed', imageUrl: base64Image } : s));
                            finalPages.push({ text: analyzedData.segments[i].text, imageUrl: base64Image });
                        } catch (imgErr) {
                            console.error("Gagal merender gambar:", imgErr);
                            const fallback = "https://via.placeholder.com/1024x1024?text=Gagal+Merender+Gambar";
                            finalPages.push({ text: analyzedData.segments[i].text, imageUrl: fallback });
                            setRenderSteps(prev => prev.map((s, idx) => idx === i ? { ...s, status: 'error', imageUrl: fallback } : s));
                        }
                    }

                    setTimeout(() => {
                        setEbookData({ title: analyzedData.title, pages: finalPages });
                        setIsGenerating(false);
                    }, 1000);
                } catch (err) {
                    console.error("Error utama:", err);
                    setError(`Error: ${err.message}. Pastikan API Key valid dan mendukung model Gemini 1.5 Flash.`);
                    setIsGenerating(false);
                }
            };

            return (
                <div className="min-h-screen pb-20">
                    {/* Header */}
                    <nav className="no-print sticky top-0 z-50 bg-white/90 backdrop-blur-md border-b border-stone-200 px-6 py-4">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-3">
                                <div className="bg-amber-600 p-2 rounded-xl text-white shadow-lg shadow-amber-200">
                                    <IconBook />
                                </div>
                                <h1 className="text-xl font-bold tracking-tight text-slate-800 hidden sm:block">Lumina Story AI</h1>
                            </div>
                            
                            <div className="flex items-center gap-3">
                                {!ebookData && !isGenerating && (
                                    <input 
                                        type="password"
                                        placeholder="API Key Gemini..."
                                        value={apiKey}
                                        onChange={(e) => setApiKey(e.target.value)}
                                        className="text-xs p-2.5 border rounded-xl focus:ring-2 focus:ring-amber-500 outline-none w-48 md:w-64 bg-stone-50 transition-all"
                                    />
                                )}
                                {ebookData && (
                                    <div className="flex gap-2">
                                        <button onClick={() => window.print()} className="flex items-center gap-2 px-5 py-2.5 bg-amber-600 text-white rounded-full hover:bg-amber-700 transition-all text-sm font-semibold shadow-md">
                                            <IconDownload /> <span className="hidden sm:inline">Simpan PDF</span>
                                        </button>
                                        <button onClick={() => { setEbookData(null); setRenderSteps([]); setStory(""); }} className="p-2.5 text-stone-400 hover:text-amber-600 transition-colors bg-white border border-stone-200 rounded-full">
                                            <IconRefresh />
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </nav>

                    <main className="max-w-6xl mx-auto px-4 mt-10">
                        {/* Input Area */}
                        {!ebookData && !isGenerating && (
                            <div className="max-w-2xl mx-auto bg-white p-10 rounded-[2.5rem] shadow-2xl border border-white animate-fade-in">
                                <div className="text-center mb-8">
                                    <div className="inline-flex p-4 bg-amber-50 text-amber-600 rounded-3xl mb-5">
                                        <IconSparkles />
                                    </div>
                                    <h2 className="text-3xl font-bold text-slate-800">Mulai Cerita Anda</h2>
                                    <p className="text-slate-500 mt-2 italic">AI akan menganalisis teks Anda dan melukis 6 ilustrasi unik.</p>
                                </div>
                                <textarea 
                                    value={story}
                                    onChange={(e) => setStory(e.target.value)}
                                    placeholder="Contoh: Petualangan seorang astronot kecil di planet permen kapas..."
                                    className="w-full h-48 p-6 bg-stone-50 border-2 border-stone-100 rounded-[2rem] focus:border-amber-500 focus:bg-white outline-none transition-all resize-none text-lg leading-relaxed shadow-inner"
                                />
                                {error && (
                                    <div className="mt-4 p-4 bg-red-50 text-red-600 rounded-2xl text-sm border border-red-100 flex items-start gap-2">
                                        <span className="shrink-0">⚠️</span>
                                        <span>{error}</span>
                                    </div>
                                )}
                                <button onClick={generateEbook} disabled={!story.trim() || !apiKey} className="w-full mt-8 py-5 bg-amber-600 text-white rounded-[2rem] font-bold text-xl shadow-xl shadow-amber-200 hover:bg-amber-700 active:scale-95 disabled:opacity-50 transition-all flex items-center justify-center gap-3">
                                    Hasilkan E-Book
                                </button>
                            </div>
                        )}

                        {/* Rendering Visualizer */}
                        {isGenerating && (
                            <div className="animate-fade-in">
                                <h2 className="text-3xl font-bold text-center mb-12 flex items-center justify-center gap-4 text-slate-800">
                                    <span className="animate-spin text-amber-600"><IconRefresh /></span>
                                    Merender Adegan Cerita...
                                </h2>
                                <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8">
                                    {renderSteps.map((step, idx) => (
                                        <div key={idx} className={`bg-white rounded-[2rem] p-5 border-2 transition-all duration-700 ${step.status === 'rendering' ? 'border-amber-400 ring-8 ring-amber-50 shadow-2xl scale-105' : 'border-stone-100 shadow-sm'}`}>
                                            <div className="aspect-square bg-stone-100 rounded-[1.5rem] mb-5 overflow-hidden relative flex items-center justify-center">
                                                {step.imageUrl ? (
                                                    <img src={step.imageUrl} className="w-full h-full object-cover animate-in fade-in duration-700" />
                                                ) : (
                                                    <div className="animate-pulse text-stone-200">
                                                        <IconBook />
                                                    </div>
                                                )}
                                            </div>
                                            <div className="flex justify-between items-center mb-2">
                                                <span className="text-xs font-bold text-amber-600 uppercase tracking-widest">Adegan {idx + 1}</span>
                                                <span className="text-[10px] text-stone-400 italic font-sans">{step.status}</span>
                                            </div>
                                            <p className="text-sm text-slate-500 line-clamp-2 italic font-serif leading-relaxed">{step.text}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* E-Book Reader */}
                        {ebookData && (
                            <div className="animate-fade-in no-print">
                                <div className="flex flex-col lg:flex-row bg-white rounded-[3rem] shadow-2xl overflow-hidden border border-stone-200 min-h-[650px]">
                                    <div className="lg:w-3/5 bg-stone-900 relative group overflow-hidden">
                                        <img src={ebookData.pages[currentPage].imageUrl} className="w-full h-full object-cover transition-transform duration-1000 transform group-hover:scale-110" key={currentPage} />
                                        <div className="absolute bottom-8 left-8 bg-black/40 backdrop-blur-xl text-white text-[10px] px-5 py-2 rounded-full uppercase tracking-widest border border-white/20">
                                            Halaman {currentPage + 1} / 6
                                        </div>
                                    </div>
                                    <div className="lg:w-2/5 p-12 md:p-16 flex flex-col justify-between bg-stone-50/50">
                                        <div>
                                            <h2 className="text-4xl font-bold text-slate-800 mb-8 font-serif leading-tight">{ebookData.title}</h2>
                                            <p className="text-2xl leading-relaxed text-slate-700 italic border-l-4 border-amber-500 pl-8 font-serif first-letter:text-5xl first-letter:font-bold">
                                                {ebookData.pages[currentPage].text}
                                            </p>
                                        </div>
                                        <div className="mt-16 flex items-center gap-6">
                                            <button onClick={() => setCurrentPage(c => Math.max(0, c - 1))} disabled={currentPage === 0} className="p-5 border-2 border-stone-200 rounded-full hover:bg-white hover:border-amber-500 hover:text-amber-600 disabled:opacity-20 transition-all shadow-sm active:scale-90 flex items-center justify-center">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m15 18-6-6 6-6"/></svg>
                                            </button>
                                            <div className="flex-1 h-2.5 bg-stone-200 rounded-full overflow-hidden shadow-inner">
                                                <div className="h-full bg-amber-500 transition-all duration-700 shadow-[0_0_10px_rgba(245,158,11,0.5)]" style={{ width: `${((currentPage + 1) / 6) * 100}%` }}></div>
                                            </div>
                                            <button onClick={() => setCurrentPage(c => Math.min(5, c + 1))} disabled={currentPage === 5} className="p-5 border-2 border-stone-200 rounded-full hover:bg-white hover:border-amber-500 hover:text-amber-600 disabled:opacity-20 transition-all shadow-sm active:scale-90 flex items-center justify-center">
                                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m9 18 6-6-6-6"/></svg>
                                            </button>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Print Template (PDF) */}
                        {ebookData && (
                            <div className="print-only hidden">
                                <div className="page-break flex flex-col items-center justify-center text-center p-20 bg-stone-50">
                                    <h1 className="text-7xl font-bold mb-6 font-serif text-slate-900">{ebookData.title}</h1>
                                    <div className="w-32 h-1.5 bg-amber-500 rounded-full mb-6"></div>
                                    <p className="text-slate-400 font-sans uppercase tracking-[0.5em] text-sm">Digital Storybook Collection</p>
                                </div>
                                {ebookData.pages.map((page, idx) => (
                                    <div key={idx} className="page-break h-screen flex flex-col bg-white">
                                        <div className="h-[70%] w-full overflow-hidden">
                                            <img src={page.imageUrl} className="w-full h-full object-cover" alt="" />
                                        </div>
                                        <div className="h-[30%] p-20 flex flex-col justify-center items-center text-center border-t border-stone-100">
                                            <p className="text-3xl italic leading-relaxed text-slate-800 font-serif max-w-4xl">
                                                {page.text}
                                            </p>
                                            <div className="mt-10 text-stone-300 font-sans text-xs tracking-[0.5em] uppercase">Halaman {idx + 1}</div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </main>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
