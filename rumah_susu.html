<!DOCTYPE html>

    <!-- Tailwind CSS CDN -->

    </script>
    
    <!-- FontAwesome for robust, CDN-based icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- Google Fonts: Urbanist & Plus Jakarta Sans -->

    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Urbanist:wght@400;600;800;900&display=swap" rel="stylesheet">
    
    <!-- React, ReactDOM and Babel Standalone for direct browser parsing -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #FFFDF9;
        }
        .heading-font {
            font-family: 'Urbanist', sans-serif;
        }
        /* Custom scrollbar for modern looks */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: #f1f5f9;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 10px;

</head>
<body class="min-h-screen flex flex-col text-slate-800">

    <div id="root"></div>

    <!-- Babel Standalone Custom Configuration Script -->
    <script>
        // Mencegah error automatic runtime importSource dengan mendaftarkan preset kustom
        Babel.registerPreset('custom-react', {
            presets: [
                [Babel.availablePresets['react'], { runtime: 'classic' }]
            ]
        });
    </script>

    <!-- React Application Logic with Custom Babel Compilation Preset -->
    <script type="text/babel" data-presets="custom-react">
        const { useState, useEffect, useMemo } = React;

        // Data Menu yang disesuaikan dari foto menu (1000322005.jpg)
        const MENU_DATA = {
            Spesial: [
                { id: 's1', name: 'Darmi Plain', tiny: 14000, monster: 17000, tag: 'Klasik', desc: 'Susu segar murni tanpa pemanis tambahan.' },
                { id: 's2', name: 'Darmi Moka', tiny: 15000, monster: 18000, tag: 'Favorit', desc: 'Perpaduan aroma kopi moka yang memikat.' },
                { id: 's3', name: 'Darmi Anggur', tiny: 15000, monster: 18000, tag: 'Unik', desc: 'Kesegaran buah anggur berpadu gurihnya susu.' },
                { id: 's4', name: 'Darmi Cokelat', tiny: 17000, monster: 20000, tag: 'Terlaris', desc: 'Cokelat premium kental yang sangat disukai.' },
                { id: 's5', name: 'Darmi Vanilla', tiny: 17000, monster: 20000, tag: 'Rekomendasi', desc: 'Keharuman vanilla khas yang lembut di lidah.' },
                { id: 's6', name: 'Darmi Taro', tiny: 19000, monster: 22000, tag: 'Populer', desc: 'Rasa taro manis gurih kekinian.' },
                { id: 's7', name: 'Darmi Greentea', tiny: 19000, monster: 22000, tag: 'Relaks', desc: 'Sensasi teh hijau Jepang asli yang menenangkan.' },
            ],
            Premium: [
                { id: 'p1', name: 'Darmi ChocoOat', tiny: 16000, monster: 19000, tag: 'Sehat', desc: 'Energi oat melimpah berpadu cokelat lezat.' },
                { id: 'p2', name: 'Darmi Regal', tiny: 17000, monster: 20000, tag: 'Terlaris', desc: 'Taburan biskuit Marie Regal asli yang crunchy.' },
                { id: 'p3', name: 'Darmi Cheese', tiny: 17000, monster: 20000, tag: 'Gurih', desc: 'Cita rasa keju gurih berpadu manisnya susu.' },
                { id: 'p4', name: 'Darmi Cookies', tiny: 17000, monster: 20000, tag: 'Manis', desc: 'Remahan cookies hitam yang crunchy melimpah.' },
                { id: 'p5', name: 'Darmi Cadbury', tiny: 22000, monster: 25000, tag: 'Mewah', desc: 'Kemewahan cokelat Cadbury murni yang meleleh.' },
            ],
            Fresh: [
                { id: 'f1', name: 'Darmi Melon', tiny: 17000, monster: 20000, tag: 'Segar', desc: 'Manisnya buah melon segar pembawa keceriaan.' },
                { id: 'f2', name: 'Darmi Pisang', tiny: 17000, monster: 20000, tag: 'Energi', desc: 'Kombinasi pisang matang penambah stamina.' },
                { id: 'f3', name: 'Darmi Strawberry', tiny: 19000, monster: 22000, tag: 'Terlaris', desc: 'Asam manis buah strawberry segar murni.' },
                { id: 'f4', name: 'Darmi Lychee', tiny: 21000, monster: 24000, tag: 'Eksotis', desc: 'Keharuman buah leci tropis berpadu susu dingin.' },
                { id: 'f5', name: 'Darmi Mangga', tiny: 21000, monster: 24000, tag: 'Manis', desc: 'Rasa buah mangga harum manis kesukaan keluarga.' },
                { id: 'f6', name: 'Darmi Almond', tiny: 22000, monster: 25000, tag: 'Premium', desc: 'Susu dengan aroma kacang almond mewah kaya gizi.' },
            ]
        };

        function App() {
            const [activeCategory, setActiveCategory] = useState('Spesial');
            const [cart, setCart] = useState([]);
            const [isAdmin, setIsAdmin] = useState(false);
            const [showLoginModal, setShowLoginModal] = useState(false);
            const [adminPasswordInput, setAdminPasswordInput] = useState('');
            const [adminTab, setAdminTab] = useState('overview');
            const [searchQuery, setSearchQuery] = useState('');
            
            // Customizer Modal State
            const [selectedProduct, setSelectedProduct] = useState(null);
            const [customSize, setCustomSize] = useState('Tiny');
            const [customSugar, setCustomSugar] = useState('Normal');
            const [customTopping, setCustomTopping] = useState(false);
            
            // Mobile Drawer State
            const [isMobileCartOpen, setIsMobileCartOpen] = useState(false);

            // Customer Form State
            const [customer, setCustomer] = useState({
                name: '',
                phone: '',
                tableOrAddress: '',
                paymentMethod: 'Cash',
            });

            // Admin Settings
            const [adminSettings, setAdminSettings] = useState({
                whatsappNumber: '628123456789',
                sheetsWebhookUrl: '',
            });

            // Local Logs Simulation (Google Sheets Simulation)
            const [sheetLogs, setSheetLogs] = useState(() => {
                const saved = localStorage.getItem('rs_sheet_logs');
                return saved ? JSON.parse(saved) : [
                    {
                        orderId: "RS-3482",
                        timestamp: "19/06/2026 09:15",
                        name: "Ahmad Dani",
                        phone: "081234567890",
                        items: "Darmi Strawberry (Monster, Normal, Coral Jelly) x1, Darmi Regal (Tiny, Less) x1",
                        total: 44000,
                        payment: "Qris",
                        status: "Berhasil"
                    },
                    {
                        orderId: "RS-8721",
                        timestamp: "19/06/2026 10:02",
                        name: "Laras Citra",
                        phone: "085788991122",
                        items: "Darmi Cokelat (Monster, Normal, Coral Jelly) x2",
                        total: 50000,
                        payment: "Cash",
                        status: "Berhasil"
                    }
                ];
            });

            useEffect(() => {
                localStorage.setItem('rs_sheet_logs', JSON.stringify(sheetLogs));
            }, [sheetLogs]);

            const [notification, setNotification] = useState(null);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3500);
            };

            const handleAdminLogin = (e) => {
                e.preventDefault();
                if (adminPasswordInput === 'admin123') {
                    setIsAdmin(true);
                    setShowLoginModal(false);
                    setAdminPasswordInput('');
                    showNotification("Selamat Datang Admin Rumah Susu! 🐄", "success");
                } else {
                    showNotification("Sandi Admin salah! Coba lagi.", "error");
                }
            };

            const handleAdminLogout = () => {
                setIsAdmin(false);
                showNotification("Keluar dari Mode Admin.", "success");
            };

            const openCustomizer = (product) => {
                setSelectedProduct(product);
                setCustomSize('Tiny');
                setCustomSugar('Normal');
                setCustomTopping(false);
            };

            const handleAddToCart = () => {
                if (!selectedProduct) return;

                const basePrice = customSize === 'Tiny' ? selectedProduct.tiny : selectedProduct.monster;
                const toppingPrice = customTopping ? 5000 : 0;
                const finalPrice = basePrice + toppingPrice;
                
                const cartItemId = `${selectedProduct.id}-${customSize}-${customSugar}-${customTopping ? 'jelly' : 'no'}`;
                const existingIndex = cart.findIndex(item => item.cartItemId === cartItemId);
                
                if (existingIndex > -1) {
                    const updatedCart = [...cart];
                    updatedCart[existingIndex].quantity += 1;
                    setCart(updatedCart);
                } else {
                    setCart([...cart, {
                        cartItemId,
                        id: selectedProduct.id,
                        name: selectedProduct.name,
                        size: customSize,
                        sugar: customSugar,
                        hasTopping: customTopping,
                        price: finalPrice,
                        quantity: 1
                    }]);
                }
                
                setSelectedProduct(null);
                showNotification(`${selectedProduct.name} telah masuk keranjang! 🥛`, "success");
            };

            const updateQuantity = (cartItemId, amount) => {
                const updatedCart = cart.map(item => {
                    if (item.cartItemId === cartItemId) {
                        const newQty = item.quantity + amount;
                        return newQty > 0 ? { ...item, quantity: newQty } : null;
                    }
                    return item;
                }).filter(Boolean);
                setCart(updatedCart);
            };

            const getCartTotal = () => {
                return cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
            };

            const getCartCount = () => {
                return cart.reduce((sum, item) => sum + item.quantity, 0);
            };

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0) {
                    showNotification("Keranjang masih kosong!", "error");
                    return;
                }

                const orderId = `RS-${Math.floor(1000 + Math.random() * 9000)}`;
                const now = new Date();
                const timestampStr = `${now.getDate().toString().padStart(2, '0')}/${(now.getMonth()+1).toString().padStart(2, '0')}/${now.getFullYear()} ${now.getHours().toString().padStart(2, '0')}:${now.getMinutes().toString().padStart(2, '0')}`;

                const itemsSummary = cart.map(item => 
                    `${item.name} (${item.size}, Gula: ${item.sugar}${item.hasTopping ? ', Coral Jelly' : ''}) x${item.quantity}`
                ).join(', ');

                const totalBayar = getCartTotal();

                const newLog = {
                    orderId,
                    timestamp: timestampStr,
                    name: customer.name,
                    phone: customer.phone,
                    items: itemsSummary,
                    total: totalBayar,
                    payment: customer.paymentMethod,
                    status: "Berhasil"
                };
                
                setSheetLogs([newLog, ...sheetLogs]);

                if (adminSettings.sheetsWebhookUrl) {
                    try {
                        await fetch(adminSettings.sheetsWebhookUrl, {
                            method: 'POST',
                            mode: 'no-cors',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify(newLog)
                        });
                        showNotification("Sukses kirim ke Google Sheets!");
                    } catch (err) {
                        console.error("Gagal kirim ke Google Sheets: ", err);
                    }
                }

                // WhatsApp message construct
                let waMessage = `*🥛 RUMAH SUSU MBOK DARMI - INVOICE #${orderId}*\n`;
                waMessage += `==================================\n`;
                waMessage += `*📅 Tanggal:* ${timestampStr}\n`;
                waMessage += `*👤 Pelanggan:* ${customer.name}\n`;
                waMessage += `*📞 WhatsApp:* ${customer.phone}\n`;
                waMessage += `*📍 Meja/Alamat:* ${customer.tableOrAddress}\n`;
                waMessage += `*💳 Pembayaran:* ${customer.paymentMethod}\n`;
                waMessage += `==================================\n\n`;
                waMessage += `*🛍️ DETAIL ORDER:*\n`;

                cart.forEach((item, idx) => {
                    waMessage += `${idx + 1}. *${item.name}* (${item.size})\n`;
                    waMessage += `   - Gula: ${item.sugar}\n`;
                    waMessage += `   - Topping: ${item.hasTopping ? 'Coral Jelly (+Rp5.000)' : 'Tanpa Topping'}\n`;
                    waMessage += `   - Qty: ${item.quantity} x Rp ${item.price.toLocaleString('id-ID')}\n`;
                    waMessage += `   - Subtotal: *Rp ${(item.price * item.quantity).toLocaleString('id-ID')}*\n\n`;
                });

                waMessage += `==================================\n`;
                waMessage += `*💰 TOTAL AKHIR: Rp ${totalBayar.toLocaleString('id-ID')}*\n`;
                waMessage += `==================================\n\n`;
                waMessage += `_Terima kasih telah memesan susu segar di Rumah Susu Mbok Darmi! 🐄🥛_`;

                const cleanedPhone = adminSettings.whatsappNumber.replace(/[^0-9]/g, '');
                const waUrl = `https://wa.me/${cleanedPhone}?text=${encodeURIComponent(waMessage)}`;
                
                window.open(waUrl, '_blank');
                
                setCart([]);
                setIsMobileCartOpen(false);
                setCustomer({ name: '', phone: '', tableOrAddress: '', paymentMethod: 'Cash' });
                showNotification("Pesanan dikirim! Membuka WhatsApp...", "success");
            };

            const stats = useMemo(() => {
                const totalRev = sheetLogs.reduce((sum, item) => sum + item.total, 0);
                const count = sheetLogs.length;
                const avg = count > 0 ? Math.round(totalRev / count) : 0;
                const qris = sheetLogs.filter(log => log.payment.toLowerCase() === 'qris').length;
                const cash = sheetLogs.filter(log => log.payment.toLowerCase() === 'cash').length;
                return { totalRev, count, avg, qris, cash };
            }, [sheetLogs]);

            const filteredLogs = useMemo(() => {
                if (!searchQuery) return sheetLogs;
                const q = searchQuery.toLowerCase();
                return sheetLogs.filter(log => 
                    log.name.toLowerCase().includes(q) || 
                    log.orderId.toLowerCase().includes(q) || 
                    log.items.toLowerCase().includes(q)
                );
            }, [sheetLogs, searchQuery]);

            return (
                <div className="min-h-screen bg-[#FFFDF9] flex flex-col font-sans antialiased text-slate-800">
                    
                    {/* NOTIFIKASI TOAST */}
                    {notification && (
                        <div className="fixed top-6 right-6 z-50 animate-in fade-in slide-in-from-top-4 duration-300">
                            <div className={`px-5 py-4 rounded-2xl shadow-2xl flex items-center gap-3 border ${
                                notification.type === 'success' 
                                    ? 'bg-emerald-50 border-emerald-100 text-emerald-950' 
                                    : 'bg-rose-50 border-rose-100 text-rose-950'
                            }`}>
                                <span className={`p-1.5 rounded-full ${notification.type === 'success' ? 'bg-emerald-500 text-white' : 'bg-rose-500 text-white'}`}>
                                    <i className="fa-solid fa-check text-xs"></i>
                                </span>
                                <p className="font-bold text-sm tracking-wide">{notification.message}</p>
                            </div>
                        </div>
                    )}

                    {/* HEADER BANNER */}
                    <header className="relative bg-gradient-to-b from-[#E0F2FE] via-[#F0F9FF] to-[#FFFDF9] pt-8 pb-12 overflow-hidden px-4">
                        <div className="absolute inset-0 z-0 opacity-40 pointer-events-none select-none">
                            <svg className="absolute bottom-0 w-full text-[#E0F2FE]" fill="currentColor" viewBox="0 0 1440 200">
                                <path d="M0,128L120,138.7C240,149,480,171,720,165.3C960,160,1200,128,1320,112L1440,96L1440,200L1320,200C1200,200,960,200,720,200C480,200,240,200,120,200L0,200Z"></path>
                            </svg>
                        </div>

                        <div className="max-w-6xl mx-auto flex flex-col md:flex-row items-center justify-between gap-6 relative z-10">
                            <div className="flex flex-col md:flex-row items-center gap-5 text-center md:text-left">
                                <div className="bg-white p-4 rounded-3xl shadow-xl shadow-blue-100/40 border border-blue-50/50 relative group">
                                    <span className="absolute -top-1 -right-1 bg-amber-400 text-blue-900 rounded-full w-6 h-6 flex items-center justify-center border-2 border-white animate-bounce text-xs">
                                        <i className="fa-solid fa-wand-magic-sparkles"></i>
                                    </span>
                                    <svg className="w-16 h-16 text-blue-600 group-hover:scale-105 transition-transform" viewBox="0 0 24 24" fill="currentColor">
                                        <path d="M12 2C6.5 2 2 5.5 2 10c0 2.2 1.1 4.2 3 5.7V20c0 .6.4 1 1 1h2c.6 0 1-.4 1-1v-1.5h6V20c0 .6.4 1 1 1h2c.6 0 1-.4 1-1v-4.3c1.9-1.5 3-3.5 3-5.7 0-4.5-4.5-8-10-8zm-4 9c-.8 0-1.5-.7-1.5-1.5S7.2 8 8 8s1.5.7 1.5 1.5S8.8 11 8 11zm8 0c-.8 0-1.5-.7-1.5-1.5S15.2 8 16 8s1.5.7 1.5 1.5-.7 1.5-1.5 1.5z" />
                                    </svg>
                                </div>
                                <div>
                                    <div className="flex flex-wrap justify-center md:justify-start items-center gap-2">
                                        <span className="bg-blue-600/10 text-blue-700 text-[10px] font-extrabold tracking-wider px-3 py-1 rounded-full uppercase">
                                            ⭐ Susu Segar Premium
                                        </span>
                                        <span className="bg-amber-100 text-amber-800 text-[10px] font-extrabold tracking-wider px-3 py-1 rounded-full uppercase">
                                            🏡 Langsung Dari Peternak
                                        </span>
                                    </div>
                                    <h1 className="text-4xl md:text-5xl font-black text-slate-900 tracking-tight mt-2.5 heading-font">
                                        Rumah Susu <span className="text-transparent bg-clip-text bg-gradient-to-r from-blue-700 to-sky-500">Mbok Darmi</span>
                                    </h1>
                                    <p className="text-slate-600 font-semibold text-sm md:text-base mt-2">
                                        Murni, Segar, Bergizi tinggi tanpa campuran pengawet dan air tambahan.🥛
                                    </p>
                                </div>
                            </div>

                            <div className="flex items-center gap-2">
                                {!isAdmin ? (
                                    <button
                                        onClick={() => setShowLoginModal(true)}
                                        className="bg-white hover:bg-slate-50 text-slate-800 text-xs font-bold px-5 py-3 rounded-2xl border border-slate-200 shadow-sm transition-all flex items-center gap-2"
                                    >
                                        <i className="fa-solid fa-lock text-amber-500"></i>
                                        Dashboard Admin
                                    </button>
                                ) : (
                                    <div className="flex items-center gap-2">
                                        <span className="bg-emerald-500 text-white text-[10px] font-extrabold px-3 py-2 rounded-xl flex items-center gap-1.5 shadow-sm">
                                            <i className="fa-solid fa-lock-open"></i> ADMIN MODE
                                        </span>
                                        <button
                                            onClick={handleAdminLogout}
                                            className="bg-rose-500 hover:bg-rose-600 text-white text-xs font-bold px-4 py-2.5 rounded-xl shadow-sm transition-all flex items-center justify-center"
                                        >
                                            <i className="fa-solid fa-right-from-bracket"></i>
                                        </button>
                                    </div>
                                )}
                            </div>
                        </div>
                    </header>

                    {/* DASHBOARD NAVIGASI */}
                    {isAdmin && (
                        <nav className="bg-white border-b border-slate-200/80 sticky top-0 z-40 shadow-sm">
                            <div className="max-w-6xl mx-auto px-4 flex justify-between items-center overflow-x-auto whitespace-nowrap">
                                <div className="flex space-x-1 py-3">
                                    <button 
                                        onClick={() => setAdminTab('overview')}
                                        className={`px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 ${
                                            adminTab === 'overview' 
                                                ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                                                : 'text-slate-600 hover:bg-slate-100'
                                        }`}
                                    >
                                        <i className="fa-solid fa-chart-line"></i>
                                        Analitik Kinerja
                                    </button>
                                    <button 
                                        onClick={() => setAdminTab('sheets')}
                                        className={`px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 ${
                                            adminTab === 'sheets' 
                                                ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                                                : 'text-slate-600 hover:bg-slate-100'
                                        }`}
                                    >
                                        <i className="fa-solid fa-file-excel"></i>
                                        Simulasi Spreadsheet ({sheetLogs.length})
                                    </button>
                                    <button 
                                        onClick={() => setAdminTab('integration')}
                                        className={`px-4 py-2 rounded-xl text-sm font-bold transition-all flex items-center gap-2 ${
                                            adminTab === 'integration' 
                                                ? 'bg-blue-600 text-white shadow-md shadow-blue-200' 
                                                : 'text-slate-600 hover:bg-slate-100'
                                        }`}
                                    >
                                        <i className="fa-solid fa-sliders"></i>
                                        Integrasi Webhook
                                    </button>
                                </div>
                                <button 
                                    onClick={() => setIsAdmin(false)}
                                    className="text-xs font-bold text-blue-600 hover:underline px-3 py-2"
                                >
                                    Kembali ke Toko &rarr;
                                </button>
                            </div>
                        </nav>
                    )}

                    {/* CONTENT CONTAINER */}
                    <main className="flex-1 max-w-6xl w-full mx-auto px-4 py-8">
                        
                        {isAdmin ? (
                            /* ========================================== */
                            /* ========================================== */
                            <div className="space-y-8 animate-in fade-in duration-300">
                                
                                {/* TAB ADMIN 1: ANALITIK KINERJA */}
                                {adminTab === 'overview' && (
                                    <div className="space-y-8">
                                        
                                        {/* Stats Widgets */}
                                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-5">
                                            
                                            <div className="bg-white border border-slate-100 rounded-3xl p-6 shadow-xl shadow-slate-100/50 flex flex-col justify-between">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs font-extrabold text-slate-500 uppercase tracking-wider">Omset Penjualan</span>
                                                    <span className="p-3 bg-emerald-50 text-emerald-600 rounded-2xl"><i className="fa-solid fa-money-bill-wave"></i></span>
                                                </div>
                                                <div className="mt-4">
                                                    <h3 className="text-3xl font-black text-slate-900">Rp {stats.totalRev.toLocaleString('id-ID')}</h3>
                                                    <p className="text-[11px] text-emerald-600 font-bold mt-1">✓ Berhasil disinkronkan</p>
                                                </div>
                                            </div>

                                            <div className="bg-white border border-slate-100 rounded-3xl p-6 shadow-xl shadow-slate-100/50 flex flex-col justify-between">
                                                <div className="flex items-center justify-between">
                                                    <span className="text-xs font-extrabold text-slate-500 uppercase tracking-wider">Total Pesanan</span>
                                                    <span className="p-3 bg-blue-50 text-blue-600 rounded-2xl"><i className="fa-solid fa-cart-shopping"></i></span>
                                                </div>
                                                <div className="mt-4">
                                                    <h3 className="text-3xl font-black text-slate-900">{stats.count} Transaksi</h3>
                                                    <p className="text-[11px] text-blue-600 font-bold mt-1">Dari berbagai saluran toko</p>

                                            <span className="text-[10px] font-extrabold text-slate-400">HARGA SUB-TOTAL</span>
                                            <p className="text-lg font-black text-slate-950">
                                                Rp {((customSize === 'Tiny' ? selectedProduct.tiny : selectedProduct.monster) + (customTopping ? 5000 : 0)).toLocaleString('id-ID')}
                                            </p>
                                        </div>
                                        <button 
                                            onClick={handleAddToCart}
                                            className="bg-blue-600 hover:bg-blue-700 text-white font-extrabold text-sm px-6 py-3.5 rounded-2xl shadow-lg shadow-blue-100"
                                        >
                                            Masukkan Keranjang
                                        </button>
                                    </div>

                                </div>

                            </div>
                        </div>
                    )}

                    {/* MOBILE ONLY FLOATING CART BAR */}
                    {!isAdmin && cart.length > 0 && (
                        <div className="lg:hidden fixed bottom-6 left-4 right-4 z-40">
                            <button 
                                onClick={() => setIsMobileCartOpen(true)}
                                className="w-full bg-gradient-to-r from-blue-700 to-blue-600 text-white p-4 rounded-2xl shadow-2xl flex items-center justify-between hover:scale-[1.02] active:scale-[0.98] transition-all"
                            >
                                <div className="flex items-center gap-3">
                                    <span className="bg-white/20 text-white text-xs font-black w-6 h-6 rounded-lg flex items-center justify-center">
                                        {getCartCount()}
                                    </span>
                                    <div>
                                        <p className="text-xs font-bold text-blue-100 text-left">Keranjang Belanja</p>
                                        <p className="text-sm font-black text-white">Rp {getCartTotal().toLocaleString('id-ID')}</p>
                                    </div>
                                </div>
                                <span className="bg-white/20 hover:bg-white/30 text-white font-extrabold text-xs px-3.5 py-2 rounded-xl flex items-center gap-1 transition-all">
                                    Keranjang <i className="fa-solid fa-chevron-right text-[10px]"></i>
                                </span>
                            </button>
                        </div>
                    )}

                    {/* MOBILE FULL-SCREEN BOTTOM SHEET CART DRAWER */}
                    {isMobileCartOpen && (
                        <div className="lg:hidden fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-50 flex items-end justify-center">
                            <div className="bg-white rounded-t-3xl w-full max-h-[85vh] flex flex-col justify-between overflow-hidden shadow-2xl animate-in slide-in-from-bottom duration-300">
                                
                                {/* Drawer Header */}
                                <div className="px-6 py-4 border-b border-slate-100 flex justify-between items-center bg-slate-50">
                                    <div className="flex items-center gap-2">
                                        <i className="fa-solid fa-cart-shopping text-blue-600"></i>
                                        <h3 className="font-black text-slate-900 text-base">Detail Keranjang Anda</h3>
                                    </div>
                                    <button 
                                        onClick={() => setIsMobileCartOpen(false)}
                                        className="p-1.5 hover:bg-slate-200 rounded-full text-slate-400 hover:text-slate-600 transition-colors"
                                    >
                                        <i className="fa-solid fa-xmark text-lg"></i>
                                    </button>
                                </div>

                                {/* Drawer Items */}
                                <div className="p-6 overflow-y-auto flex-1 divide-y divide-slate-100">
                                    {cart.map((item) => (
                                        <CartListItem key={item.cartItemId} item={item} onUpdateQuantity={updateQuantity} />
                                    ))}
                                </div>

                                {/* Drawer Checkout */}
                                <div className="p-6 bg-slate-50 border-t border-slate-100 space-y-4">
                                    <div className="flex justify-between items-baseline">
                                        <span className="text-xs font-bold text-slate-500 uppercase tracking-widest">Total Tagihan</span>
                                        <span className="text-xl font-black text-blue-700">Rp {getCartTotal().toLocaleString('id-ID')}</span>
                                    </div>

                                    <CheckoutForm 
                                        customer={customer} 
                                        setCustomer={setCustomer} 
                                        onSubmit={handleCheckout} 
                                    />
                                </div>

                            </div>
                        </div>
                    )}

                    {/* ADMIN VERIFICATION MODAL */}
                    {showLoginModal && (
                        <div className="fixed inset-0 bg-slate-950/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl max-w-sm w-full p-6 shadow-2xl border border-slate-100 animate-in zoom-in-95 duration-200">
                                <div className="text-center space-y-2 mb-6">
                                    <span className="p-3 bg-blue-50 text-blue-600 rounded-2xl inline-block"><i className="fa-solid fa-lock text-xl"></i></span>
                                    <h3 className="font-extrabold text-lg text-slate-950 heading-font">Verifikasi Dashboard</h3>
                                    <p className="text-slate-500 text-xs">Akses terbatas hanya untuk administrator Rumah Susu.</p>
                                </div>

                                <form onSubmit={handleAdminLogin} className="space-y-4">
                                    <div>
                                        <label className="block text-[10px] font-extrabold text-slate-500 uppercase tracking-widest mb-1.5">Kata Sandi Admin</label>
                                        <input 
                                            type="password"
                                            required
                                            value={adminPasswordInput}
                                            onChange={(e) => setAdminPasswordInput(e.target.value)}
                                            placeholder="Sandi default: admin123"
                                            className="w-full border border-slate-200 rounded-xl p-3.5 text-sm focus:ring-2 focus:ring-blue-500 outline-none font-bold text-center"
                                            autoFocus
                                        />
                                    </div>

                                    <div className="flex gap-2 pt-2">
                                        <button 
                                            type="button" 
                                            onClick={() => setShowLoginModal(false)}
                                            className="flex-1 py-3 px-4 rounded-xl border border-slate-200 font-bold text-xs hover:bg-slate-50 text-slate-600"
                                        >
                                            Batal
                                        </button>
                                        <button 
                                            type="submit" 
                                            className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold text-xs py-3 px-4 rounded-xl shadow-md"
                                        >
                                            Masuk Admin
                                        </button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="bg-slate-950 text-slate-400 py-12 mt-16 border-t border-slate-900 text-xs text-center">
                        <div className="max-w-6xl mx-auto px-4 space-y-4">
                            <div className="flex items-center justify-center gap-2">
                                <span className="text-white font-black tracking-widest">🥛 RUMAH SUSU</span>
                                <span className="text-slate-800">|</span>
                                <span className="font-bold">Mbok Darmi Premium</span>
                            </div>
                            <p className="max-w-md mx-auto text-[11px] text-slate-500 leading-relaxed">
                                Menghadirkan kenikmatan susu murni dari peternakan lokal terbaik untuk gizi harian Anda yang maksimal.
                            </p>
                            <div className="pt-4 border-t border-slate-900 flex flex-wrap justify-center gap-6 text-[10px] text-slate-600">
                                <span>© 2026 Rumah Susu Mbok Darmi. All Rights Reserved.</span>
                                <span>Optimized for seamless GitHub Pages deployment.</span>
                            </div>
                        </div>
                    </footer>

                </div>
            );
        }

        // HELPER COMPONENT: LIST ITEM KERANJANG
        function CartListItem({ item, onUpdateQuantity }) {
            return (
                <div className="py-4 flex justify-between items-start gap-2">
                    <div className="flex-1">
                        <h4 className="font-bold text-sm text-slate-800 tracking-tight">{item.name}</h4>
                        <div className="flex flex-wrap gap-1 mt-1">
                          <span className="bg-blue-50 text-blue-700 text-[10px] px-2 py-0.5 rounded-md font-bold">
                              {item.size}
                          </span>
                          <span className="bg-slate-100 text-slate-600 text-[10px] px-2 py-0.5 rounded-md font-bold">
                              Gula: {item.sugar}
                          </span>
                          {item.hasTopping && (
                              <span className="bg-amber-50 text-amber-700 text-[10px] px-2 py-0.5 rounded-md font-bold">
                                  + Jelly
                              </span>
                          )}
                        </div>
                        <p className="text-xs text-blue-600 font-extrabold mt-1.5">
                            Rp {item.price.toLocaleString('id-ID')} / pcs
                        </p>
                    </div>

                    <div className="flex flex-col items-end gap-2">
                        <div className="flex items-center gap-1 bg-slate-50 rounded-lg p-0.5 border border-slate-100">
                            <button 
                                onClick={() => onUpdateQuantity(item.cartItemId, -1)}
                                className="bg-white hover:bg-slate-100 text-slate-700 p-1.5 rounded-md transition-colors shadow-sm"
                            >
                                <i className="fa-solid fa-minus text-[10px]"></i>
                            </button>
                            <span className="text-xs font-extrabold px-2.5">{item.quantity}</span>
                            <button 
                                onClick={() => onUpdateQuantity(item.cartItemId, 1)}
                                className="bg-white hover:bg-slate-100 text-slate-700 p-1.5 rounded-md transition-colors shadow-sm"
                            >
                                <i className="fa-solid fa-plus text-[10px]"></i>
                            </button>
                        </div>
                        <span className="text-xs font-black text-slate-800">
                            Rp {(item.price * item.quantity).toLocaleString('id-ID')}
                        </span>
                    </div>
                </div>
            );
        }

        // HELPER COMPONENT: CHECKOUT FORM
        function CheckoutForm({ customer, setCustomer, onSubmit }) {
            return (
                <form onSubmit={onSubmit} className="space-y-3 pt-4 border-t border-slate-100 text-left">
                    <div className="space-y-1">
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                            <i className="fa-solid fa-user text-blue-500"></i> Nama Anda
                        </label>
                        <input 
                            type="text" 
                            required
                            value={customer.name}
                            onChange={(e) => setCustomer({...customer, name: e.target.value})}
                            placeholder="Isi nama pemesan..."
                            className="w-full text-xs border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-bold"
                        />
                    </div>

                    <div className="space-y-1">
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                            <i className="fa-solid fa-phone text-blue-500"></i> WhatsApp
                        </label>
                        <input 
                            type="tel" 
                            required
                            value={customer.phone}
                            onChange={(e) => setCustomer({...customer, phone: e.target.value})}
                            placeholder="Contoh: 0812xxxxxxxx"
                            className="w-full text-xs border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-bold"
                        />
                    </div>

                    <div className="space-y-1">
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                            <i className="fa-solid fa-location-dot text-blue-500"></i> Nomor Meja / Alamat
                        </label>
                        <input 
                            type="text" 
                            required
                            value={customer.tableOrAddress}
                            onChange={(e) => setCustomer({...customer, tableOrAddress: e.target.value})}
                            placeholder="Meja 05 / Alamat Kirim..."
                            className="w-full text-xs border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 outline-none font-bold"
                        />
                    </div>

                    <div className="space-y-1">
                        <label className="text-[10px] font-extrabold text-slate-400 uppercase tracking-wider flex items-center gap-1.5">
                            <i className="fa-solid fa-credit-card text-blue-500"></i> Metode Bayar
                        </label>
                        <select
                            value={customer.paymentMethod}
                            onChange={(e) => setCustomer({...customer, paymentMethod: e.target.value})}
                            className="w-full text-xs border border-slate-200 rounded-xl p-3 focus:ring-2 focus:ring-blue-500 focus:border-blue-500 bg-white outline-none font-bold cursor-pointer"
                        >
                            <option value="Cash">Cash / Bayar di Kasir</option>
                            <option value="Qris">QRIS / E-Wallet</option>
                            <option value="Transfer Bank">Transfer Bank</option>
                        </select>
                    </div>

                    <button
                        type="submit"
                        className="w-full bg-emerald-600 hover:bg-emerald-700 text-white font-extrabold text-xs py-3.5 rounded-xl shadow-lg shadow-emerald-100 flex items-center justify-center gap-2 mt-4"
                    >
                        <i className="fa-brands fa-whatsapp text-sm"></i> Kirim Pesanan ke WhatsApp
                    </button>
                </form>
            );
        }

        // Mount the React Application on window load
        window.onload = function() {
            const container = document.getElementById('root');
            const root = ReactDOM.createRoot(container);
            root.render(<App />);
        }
    </script>
</body>
</html>
